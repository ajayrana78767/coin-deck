name: coin_deck
description: "A Flutter take-home assignment featuring virtual coin-based gaming."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management & Navigation
  get: ^4.7.3

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Storage Location
  path_provider: ^2.1.6

  # Formatting Date & Time
  intl: ^0.20.3

  # Generate Unique Bet IDs
  uuid: ^4.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_native_splash: ^2.4.8
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/images/logo.png"

  remove_alpha_ios: true

  adaptive_icon_background: "#FFC94A"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter_native_splash:
  color: "#0E1022"

  android: true
  ios: true

  android_12:
    color: "#0E1022"